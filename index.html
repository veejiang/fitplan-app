<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>6-Week FitPlan</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1016;--surface:#181c26;--card:#1e2235;
  --accent:#e8538f;--al:rgba(232,83,143,.15);
  --accent2:#7b61ff;--a2l:rgba(123,97,255,.15);
  --green:#34c984;--gl:rgba(52,201,132,.15);--gb:rgba(52,201,132,.3);
  --amber:#f5a623;--ambl:rgba(245,166,35,.12);--ambb:rgba(245,166,35,.3);
  --text:#eaeef8;--text2:#8892b0;--border:#252a40;
  --nav:65px;--hdr:58px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
.logo{font-size:18px;font-weight:800}.logo span{color:var(--accent)}
.wk-sel{display:flex;align-items:center;gap:5px;background:var(--card);border-radius:20px;padding:5px 10px;border:1px solid var(--border)}
.wk-btn{background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;width:20px;display:flex;align-items:center;justify-content:center}
.wk-lbl{font-size:13px;font-weight:700;min-width:50px;text-align:center}
.wk-phase{font-size:9px;color:var(--text2);text-align:center;margin-top:1px}
.main{margin-top:var(--hdr);margin-bottom:var(--nav);padding:14px;max-width:540px;margin-left:auto;margin-right:auto}
.panel{display:none}.panel.on{display:block}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);cursor:pointer;gap:2px;font-size:9px;font-weight:600;transition:color .2s}
.nb.on{color:var(--accent)}.nb-ico{font-size:20px;line-height:1}
.daybar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.daybtn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dayinfo{flex:1;background:var(--card);border-radius:12px;padding:10px 14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.day-name{font-size:15px;font-weight:700}.day-sub{font-size:11px;color:var(--text2);margin-top:2px}
.pbadge{background:var(--al);color:var(--accent);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700}
.sess-hdr{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.sess-ico{font-size:32px;line-height:1;margin-top:2px}.sess-det{flex:1;min-width:0}
.sess-name{font-size:16px;font-weight:700;margin-bottom:5px}
.sess-meta{display:flex;flex-wrap:wrap;gap:7px;font-size:12px;color:var(--text2);margin-bottom:8px}
.meta-chip{background:var(--card);border-radius:6px;padding:2px 8px;font-size:11px}
.rpe-chip{background:var(--al);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.burn-chip{background:var(--ambl);color:var(--amber);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
.pbar-wrap{background:var(--bg);border-radius:6px;height:5px;overflow:hidden;margin-top:2px;flex:1}
.pbar-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:6px;transition:width .4s}
.pbar-row{display:flex;align-items:center;gap:8px}
.pbar-lbl{font-size:10px;color:var(--text2);white-space:nowrap}
.skip-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-top:8px}
.coll{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.coll-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none}
.coll-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.coll-ico{font-size:17px}.chevron{color:var(--text2);font-size:13px;transition:transform .2s}
.coll.op .chevron{transform:rotate(180deg)}
.coll-body{display:none;padding:0 14px 14px}.coll.op .coll-body{display:block}
.pstep{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.pstep:last-child{border-bottom:none}
.snum{background:var(--al);color:var(--accent);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.aname{font-weight:600}.anote{font-size:11px;color:var(--text2);margin-top:2px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.ex-card.ex-done{border-color:var(--gb)}.ex-card.ex-held{border-color:var(--ambb)}
.ex-main{padding:13px 14px}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.ex-name{font-size:15px;font-weight:700;line-height:1.3;display:flex;align-items:center;gap:6px}
.edit-ico{font-size:13px;color:var(--text2);cursor:pointer;opacity:.6;flex-shrink:0}
.ex-muscle{font-size:11px;color:var(--text2);margin-top:2px}
.ex-badge{background:var(--a2l);color:var(--accent2);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:800;white-space:nowrap;text-align:center;flex-shrink:0;line-height:1.3}
.ex-badge small{font-size:10px;font-weight:500;color:var(--text2);display:block}
.ex-badge.held{background:var(--ambl);color:var(--amber)}
.ex-badge.held small{color:var(--amber);opacity:.7}
.set-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.sdot{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--text2);user-select:none}
.sdot.done{background:var(--green);border-color:var(--green);color:#0a120e}
.sdot:active{transform:scale(.88)}
.ol-ind{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;border-radius:8px;padding:5px 10px;margin-top:4px;width:fit-content}
.ol-unlock{background:var(--gl);color:var(--green);border:1px solid var(--gb)}
.ol-held{background:var(--ambl);color:var(--amber);border:1px solid var(--ambb)}
.ol-target{font-size:10px;padding:2px 7px;border-radius:5px;margin-left:3px;background:rgba(255,255,255,.07)}
.cue-row{padding:10px 14px;background:rgba(255,255,255,.02);border-top:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;gap:8px;cursor:pointer;line-height:1.5}
.cue-ico{flex-shrink:0;font-size:14px}
.cue-txt{overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.cue-txt.exp{display:block;-webkit-line-clamp:unset}
.rest-card{background:var(--card);border-radius:20px;padding:44px 24px;text-align:center;border:1px solid var(--border)}
.rest-emo{font-size:60px;margin-bottom:14px}.rest-ttl{font-size:22px;font-weight:700;margin-bottom:8px}
.rest-sub{color:var(--text2);font-size:13px;line-height:1.7}
.skipped-card{background:var(--ambl);border:1px solid var(--ambb);border-radius:14px;padding:20px;text-align:center;margin-bottom:12px}
.skipped-emo{font-size:36px;margin-bottom:8px}.skipped-ttl{font-size:15px;font-weight:700;color:var(--amber);margin-bottom:4px}
.skipped-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.undo-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer}
.makeup-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px}
.makeup-pill{background:var(--al);color:var(--accent);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}
.makeup-from{font-size:11px;color:var(--text2)}.makeup-div{flex:1;height:1px;background:var(--border)}
.sched-row{background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;cursor:pointer}
.sched-row.today{border-color:var(--accent)}
.sched-day{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--surface);flex-shrink:0}
.sched-row.today .sched-day{background:var(--accent);color:#fff}
.sched-sname{font-size:14px;font-weight:600}.sched-ssub{font-size:11px;color:var(--text2);margin-top:2px}
.sched-arr{color:var(--text2);margin-left:auto;font-size:18px}
.stag{font-size:10px;border-radius:6px;padding:2px 6px;margin-left:4px}
.stag-skip{background:var(--ambl);color:var(--amber)}.stag-push{background:var(--al);color:var(--accent)}
/* ── LOG TAB ── */
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.date-lbl{flex:1;text-align:center;font-size:15px;font-weight:700}
.macro-ring{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.macro-tile{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.macro-val{font-size:18px;font-weight:800;color:var(--accent)}.macro-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.macro-bar-wrap{background:var(--bg);border-radius:4px;height:4px;margin-top:6px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.cal-summary{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.cal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-big{font-size:22px;font-weight:800;color:var(--accent)}
.cal-detail{font-size:12px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap}
.net-indicator{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.net-deficit{background:var(--gl);color:var(--green)}.net-surplus{background:var(--ambl);color:var(--amber)}
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text2)}
.search-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.search-item:last-child{border-bottom:none}
.search-item:hover,.search-item:active{background:var(--card)}
.si-name{font-size:13px;font-weight:600}
.si-meta{font-size:11px;color:var(--text2);margin-top:2px}
.si-cal{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;margin-left:10px}
.qty-row{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:none}
.qty-row.on{display:flex;align-items:center;gap:10px}
.qty-inp{width:60px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:14px;color:var(--text);outline:none;text-align:center}
.qty-food{font-size:13px;font-weight:600;flex:1}
.qty-cal{font-size:13px;color:var(--accent);font-weight:700;white-space:nowrap}
.add-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.log-list{margin-top:4px}
.log-item{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:7px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.li-name{font-size:13px;font-weight:600;flex:1}
.li-qty{font-size:11px;color:var(--text2)}
.li-cal{font-size:13px;font-weight:700;color:var(--accent);margin-left:auto}
.li-del{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;transition:color .2s}
.li-del:hover{color:var(--red,#ff5f6d)}
.custom-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.custom-inp{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);outline:none}
.custom-inp::placeholder{color:var(--text2)}
/* ── PROGRESS TAB ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-tile{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
.stat-val{font-size:17px;font-weight:800;line-height:1.2}
.stat-lbl{font-size:9px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.wt-input-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.wt-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;font-weight:700;color:var(--text);outline:none;text-align:center}
.wt-inp:focus{border-color:var(--accent)}
.save-wt-btn{background:var(--accent);border:none;border-radius:10px;color:#fff;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer}
.chart-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.chart-ttl{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-legend{display:flex;gap:12px;font-size:10px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.wt-hist{margin-top:10px}
.wt-hist-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.wt-hist-item:last-child{border-bottom:none}
.wt-hist-date{color:var(--text2);font-size:11px}
.wt-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px}
/* ── NUTRITION TAB ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.info-tile{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);text-align:center}
.tile-val{font-size:18px;font-weight:800;color:var(--accent);line-height:1.2}.tile-lbl{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.meal-card{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;gap:12px}
.meal-emo{font-size:24px;flex-shrink:0}.meal-type{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meal-name{font-size:13px;font-weight:700;margin-bottom:2px}.meal-desc{font-size:12px;color:var(--text2)}
.rule-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.rule-row:last-child{border-bottom:none}.rico{flex-shrink:0;font-size:18px}
/* ── REF TAB ── */
.scroll-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.scroll-tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer}
.stab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.gloss-item{padding:12px 0;border-bottom:1px solid var(--border)}.gloss-item:last-child{border-bottom:none}
.gloss-name{font-size:14px;font-weight:700;margin-bottom:3px}.gloss-muscle{font-size:11px;color:var(--accent);margin-bottom:4px;font-weight:600}
.gloss-cue{font-size:12px;color:var(--text2);line-height:1.6}
.tip-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.tip-row:last-child{border-bottom:none}.tip-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.tip-ttl{font-weight:700;display:block;margin-bottom:2px}
.cardio-blk{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.cardio-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cardio-wk{font-size:14px;font-weight:700}.cardio-type{font-size:11px;color:var(--accent);font-weight:700;background:var(--al);padding:3px 9px;border-radius:10px}
.cardio-proto{font-size:13px;color:var(--text2);line-height:1.7}
.phase-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.phase-tbl th{text-align:left;padding:7px 8px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.phase-tbl td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.phase-tbl tr:last-child td{border-bottom:none}
.ref-sec{display:none}.ref-sec.on{display:block}
/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none}
.modal-bg.on{display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:540px;border-top:1px solid var(--border)}
.modal-ttl{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-row{display:flex;gap:10px;margin-bottom:12px;align-items:center}
.modal-lbl{font-size:13px;font-weight:600;width:120px;flex-shrink:0;color:var(--text2)}
.modal-inp{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--text);outline:none}
.modal-inp:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-cancel{flex:1;background:none;border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.modal-save{flex:2;background:var(--accent);border:none;border-radius:10px;color:#fff;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.sec-hd{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}
.sec-hd:first-child{margin-top:0}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">Fit<span>Plan</span></div>
  <div class="wk-sel">
    <button class="wk-btn" onclick="chWk(-1)">‹</button>
    <div><div class="wk-lbl" id="wkLbl">Week 1</div><div class="wk-phase" id="wkPhase">Phase 1</div></div>
    <button class="wk-btn" onclick="chWk(1)">›</button>
  </div>
</header>
<main class="main">
  <div class="panel on" id="tab-today"></div>
  <div class="panel" id="tab-schedule"></div>
  <div class="panel" id="tab-log"></div>
  <div class="panel" id="tab-progress"></div>
  <div class="panel" id="tab-ref"></div>
</main>
<nav class="nav">
  <button class="nb on"  data-tab="today"    onclick="goTab('today',this)"><span class="nb-ico">🏋️</span>Today</button>
  <button class="nb"     data-tab="schedule" onclick="goTab('schedule',this)"><span class="nb-ico">📅</span>Schedule</button>
  <button class="nb"     data-tab="log"      onclick="goTab('log',this)"><span class="nb-ico">🍽️</span>Food Log</button>
  <button class="nb"     data-tab="progress" onclick="goTab('progress',this)"><span class="nb-ico">📊</span>Progress</button>
  <button class="nb"     data-tab="ref"      onclick="goTab('ref',this)"><span class="nb-ico">📖</span>Guide</button>

  if(sessKey==='cardio')base=week<=2?200:week<=4?275:360;
  else if(sessKey==='opt')base=120;
  else base=BURN_BASE[sessKey]||250;
  return Math.round(base*scale*(0.3+0.7*fraction));
}
function updateBurnForToday(sess,total,done){
  const fraction=total>0?done/total:0;
  BURN_LOG[getDS()]=estimateBurn(sess.key,CW,fraction);
  saveState();
}

/* ============================================================  PROGRESSIVE OVERLOAD  */
function customWeightFor(sess,exIdx,week){
  const k=`${sess.key}_${exIdx}`;
  if(CSTART[k]===undefined)return null;
  const inc=CINC[k]??sess.exercises[exIdx].inc;
  const val=Math.round((CSTART[k]+(week-1)*inc)*2)/2;
  return val;
}
function planWeightNum(wStr){return parseFloat(wStr)||0}
function effectiveWeight(sess,exIdx,week){
  const ex=sess.exercises[exIdx];
  const plan=ex.wks[week-1];
  // Determine base weight (custom start or plan)
  const cw=customWeightFor(sess,exIdx,week);
  const wNum=cw!==null?cw:planWeightNum(plan.w);
  const wStr=cw!==null?`${wNum} lb`:plan.w;
  const base={s:plan.s,r:plan.r,w:wStr,wNum};

  if(week<=1)return{...base,held:false,heldFrom:null,plannedW:wStr};
  const prevDone=DONE[dkey(sess.key,exIdx,week-1)];
  if(prevDone===false){
    const prev=effectiveWeight(sess,exIdx,week-1);
    return{s:plan.s,r:plan.r,w:prev.w,wNum:prev.wNum,held:true,heldFrom:week-1,plannedW:wStr};
  }
  return{...base,held:false,heldFrom:null,plannedW:wStr};
}
function isExDone(sess,exIdx){
  const n=sess.exercises[exIdx].wks[CW-1].s;
  for(let s=0;s<n;s++)if(!SETS[skey(sess.key,exIdx,s)])return false;
  return n>0;
}
function updateDone(sess,exIdx){DONE[dkey(sess.key,exIdx,CW)]=isExDone(sess,exIdx)}

/* ============================================================  SKIP ENGINE  */
function skipWorkout(){
  const ds=getDS(),next=getDS(DOF+1),sess=SCHED[curDow()];
  if(!sess?.key||sess.type==='rest'||sess.type==='opt')return;
  if(SKIPS[ds]===sess.key){
    delete SKIPS[ds];
    if(PUSHES[next]){PUSHES[next]=PUSHES[next].filter(k=>k!==sess.key);if(!PUSHES[next].length)delete PUSHES[next]}
  }else{
    SKIPS[ds]=sess.key;
    if(!PUSHES[next])PUSHES[next]=[];
    if(!PUSHES[next].includes(sess.key))PUSHES[next].push(sess.key);
  }
  saveState();renderToday();renderSchedule();
}
function undoSkip(ds,sk){
  if(SKIPS[ds]!==sk)return;
  delete SKIPS[ds];
  const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+1);
  const nx=d.toISOString().slice(0,10);
  if(PUSHES[nx]){PUSHES[nx]=PUSHES[nx].filter(k=>k!==sk);if(!PUSHES[nx].length)delete PUSHES[nx]}
  saveState();renderToday();renderSchedule();
}

/* ============================================================  FOOD LOG ENGINE  */
let _pendingFood=null,_logDOF=0;
function logDS(){const d=new Date();d.setDate(d.getDate()+_logDOF);return d.toISOString().slice(0,10)}
function foodSearch(q){

function addCustomFood(name,cal,p,c,fat){

  FOOD_LOG[ds].push({fi:-1,qty:1,name,cal:parseInt(cal),p:parseFloat(p)||0,c:parseFloat(c)||0,fat:parseFloat(fat)||0,unit:'custom'});

function removeFoodEntry(ds,idx){

function getDayIntake(ds){
  return(FOOD_LOG[ds]||[]).reduce((a,f)=>a+f.cal,0);
}
function getDayBurn(ds){return BURN_LOG[ds]||0}
function getDayMacros(ds){
  return(FOOD_LOG[ds]||[]).reduce((a,f)=>({p:a.p+f.p,c:a.c+f.c,fat:a.fat+f.fat}),{p:0,c:0,fat:0});
}
function getLast7(){
  const arr=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push({ds:d.toISOString().slice(0,10),lbl:d.toLocaleDateString('en',{weekday:'short'}).slice(0,2)});}return arr;

function getLast14Wt(){

/* ============================================================  CHARTS  */
function calChart(){
  const days=getLast7(),W=308,H=130,pl=28,pb=22,pt=8,pr=8;
  const cw=W-pl-pr,ch=H-pt-pb;
  const maxCal=2400;
  const sy=v=>pt+ch-(v/maxCal*ch);
  const xc=(i)=>pl+(i+0.5)*(cw/7);
  const bw=cw/7*0.45;
  let g='',burnPts=[];
  // grid
  [600,1200,1800].forEach(v=>{
    const y=sy(v);
    g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#252a40" stroke-width="1"/>`;
    g+=`<text x="${pl-3}" y="${y+3.5}" text-anchor="end" fill="#8892b0" font-size="8">${v/1000}k</text>`;
  });
  // target line at 1600
  const ty=sy(1600);
  g+=`<line x1="${pl}" y1="${ty}" x2="${W-pr}" y2="${ty}" stroke="rgba(232,83,143,0.3)" stroke-width="1" stroke-dasharray="4,3"/>`;
  days.forEach((d,i)=>{
    const x=xc(i);
    const eat=getDayIntake(d.ds);
    const burn=getDayBurn(d.ds);
    if(eat>0){const bh=eat/maxCal*ch;g+=`<rect x="${x-bw/2}" y="${sy(eat)}" width="${bw}" height="${bh}" rx="2" fill="rgba(232,83,143,0.65)"/>`;}
    g+=`<text x="${x}" y="${H-6}" text-anchor="middle" fill="#8892b0" font-size="9">${d.lbl}</text>`;
    if(burn>0)burnPts.push({x,y:sy(burn)});
  });
  if(burnPts.length>1){
    let p=burnPts.map((pt,i)=>`${i?'L':'M'}${pt.x},${pt.y}`).join('');
    g+=`<path d="${p}" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="4,2"/>`;
  }
  burnPts.forEach(pt=>g+=`<circle cx="${pt.x}" cy="${pt.y}" r="3" fill="#f5a623"/>`);
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="width:100%">${g}</svg>`;
}

function wtChart(){
  const entries=getLast14Wt();
  if(entries.length<2)return`<p style="text-align:center;color:var(--text2);font-size:12px;padding:20px 0">Log at least 2 weigh-ins to see chart</p>`;
  const W=308,H=100,pl=34,pb=20,pt=8,pr=8;
  const cw=W-pl-pr,ch=H-pt-pb;
  const wts=entries.map(e=>e[1]);
  const minW=Math.floor(Math.min(...wts))-2,maxW=Math.ceil(Math.max(...wts))+2;
  const sy=v=>pt+ch-((v-minW)/(maxW-minW)*ch);
  const n=entries.length;
  let g='';
  // grid labels
  [minW,Math.round((minW+maxW)/2),maxW].forEach(v=>{
    const y=sy(v);
    g+=`<text x="${pl-3}" y="${y+3.5}" text-anchor="end" fill="#8892b0" font-size="8">${v}</text>`;
    g+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#252a40" stroke-width="1"/>`;
  });
  // line
  const pts=entries.map(([ds,w],i)=>{
    const x=pl+i*(cw/(n-1));
    return{x,y:sy(w),lbl:new Date(ds+'T00:00:00').toLocaleDateString('en',{month:'short',day:'numeric'})};
  });
  let path=pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join('');
  g+=`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;
  pts.forEach(p=>{
    g+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)"/>`;
  });
  // start/end labels
  if(pts.length>0){
    g+=`<text x="${pts[0].x}" y="${H-3}" text-anchor="middle" fill="#8892b0" font-size="7.5">${pts[0].lbl}</text>`;
    g+=`<text x="${pts[pts.length-1].x}" y="${H-3}" text-anchor="middle" fill="#8892b0" font-size="7.5">${pts[pts.length-1].lbl}</text>`;
  }
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="width:100%">${g}</svg>`;
}

  let out=`<div class="date-bar">
    <button class="daybtn" onclick="_logDOF--;renderLog()">‹</button>
    <div class="date-lbl">${ldLabel}</div>
    <button class="daybtn" onclick="_logDOF++;renderLog()">›</button>
  </div>

  <div class="cal-summary">
    <div class="cal-row">
      <div><div class="cal-big">${totalCal} <span style="font-size:13px;font-weight:500;color:var(--text2)">kcal eaten</span></div></div>
      ${burn>0?`<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:var(--amber)">${totalCal-burn}</div><div style="font-size:10px;color:var(--text2)">net kcal</div></div>`:''}
    </div>
    <div class="cal-detail">
      <span>Target: ${target} kcal</span>
      ${burn>0?`<span>🔥 ${burn} burned</span>`:''}
      ${totalCal>0?`<span class="${totalCal<=target?'net-deficit':'net-surplus'}">${totalCal<=target?`▼ ${target-totalCal} under`:`▲ ${totalCal-target} over`} target</span>`:''}
    </div>
    <div style="margin-top:10px">
      <div class="pbar-wrap" style="height:7px;background:var(--bg)">
        <div class="pbar-fill" style="width:${Math.min(100,Math.round(totalCal/target*100))}%;background:${totalCal>target?'var(--amber)':'var(--accent)'}"></div>
      </div>
      <div style="font-size:10px;color:var(--text2);margin-top:4px;text-align:right">${Math.round(totalCal/target*100)}% of ${target} kcal target</div>
    </div>
  </div>

  <div class="macro-ring">
    <div class="macro-tile"><div class="macro-val">${macros.p.toFixed(0)}g <span style="font-size:11px;font-weight:500;color:var(--text2)">/ ${protTgt}g</span></div><div class="macro-lbl">Protein</div><div class="macro-bar-wrap"><div class="macro-bar-fill" style="width:${pPct}%;background:#7b61ff"></div></div></div>
    <div class="macro-tile"><div class="macro-val">${macros.c.toFixed(0)}g <span style="font-size:11px;font-weight:500;color:var(--text2)">/ ${carbTgt}g</span></div><div class="macro-lbl">Carbs</div><div class="macro-bar-wrap"><div class="macro-bar-fill" style="width:${cPct}%;background:#34c984"></div></div></div>
    <div class="macro-tile"><div class="macro-val">${macros.fat.toFixed(0)}g <span style="font-size:11px;font-weight:500;color:var(--text2)">/ ${fatTgt}g</span></div><div class="macro-lbl">Fat</div><div class="macro-bar-wrap"><div class="macro-bar-fill" style="width:${fPct}%;background:#f5a623"></div></div></div>
    <div class="macro-tile" style="text-align:left"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Calorie Target</div><div style="font-size:11px;line-height:1.6"><span style="color:var(--accent)">● Lift days:</span> 1,650–1,700<br><span style="color:var(--accent2)">● Rest days:</span> 1,500–1,550</div></div>
  </div>

  <div class="search-wrap">
    <input class="search-inp" id="foodSearch" type="text" placeholder="🔍  Search food or ingredient..." oninput="onFoodSearch(this.value)" autocomplete="off">
    <div class="search-drop" id="searchDrop" style="display:none"></div>
  </div>

  <div class="qty-row" id="qtyRow">
    <div style="flex:1">
      <div class="qty-food" id="qtyName">—</div>
      <div style="font-size:11px;color:var(--text2)" id="qtyUnit">—</div>
    </div>
    <span style="font-size:12px;color:var(--text2)">×</span>
    <input class="qty-inp" id="qtyAmt" type="number" min="0.1" step="0.5" value="1" oninput="updateQtyCal()">
    <div class="qty-cal" id="qtyCal">—</div>
    <button class="add-btn" onclick="confirmAddFood()">Add</button>
  </div>

  <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Or add custom:</div>
  <div class="custom-row">
    <input class="custom-inp" id="cName" placeholder="Name" style="flex:2">
    <input class="custom-inp" id="cCal" placeholder="kcal" type="number" style="width:60px;flex:none">
    <input class="custom-inp" id="cProt" placeholder="P(g)" type="number" style="width:52px;flex:none">
    <input class="custom-inp" id="cCarb" placeholder="C(g)" type="number" style="width:52px;flex:none">
    <input class="custom-inp" id="cFat" placeholder="F(g)" type="number" style="width:52px;flex:none">
    <button class="add-btn" onclick="confirmCustomFood()">+</button>
  </div>

  <div class="sec-hd" style="margin-top:16px">Today's Log ${entries.length>0?`<span style="font-weight:400;color:var(--text2)">(${entries.length} items)</span>`:''}</div>
  <div class="log-list">`;

  if(!entries.length)out+=`<div style="text-align:center;color:var(--text2);font-size:13px;padding:20px 0">No food logged yet — search above to add items.</div>`;
  else entries.forEach((e,i)=>out+=`<div class="log-item">
    <div style="flex:1"><div class="li-name">${e.name}</div><div class="li-qty">${e.qty} × ${e.unit} · P${e.p}g C${e.c}g F${e.fat}g</div></div>
    <div class="li-cal">${e.cal} kcal</div>
    <button class="li-del" onclick="removeFoodEntry('${ds}',${i})">×</button>
  </div>`);

  out+=`</div>`;

  // Sample meals reference
  out+=`<div class="sec-hd" style="margin-top:18px">Sample Meal Ideas</div>`;
  MEALS.forEach(m=>{out+=`<div class="meal-card"><div class="meal-emo">${m.emo}</div><div><div class="meal-type">${m.type}</div><div class="meal-name">${m.name}</div><div class="meal-desc">${m.desc}</div></div></div>`;});

  document.getElementById('tab-log').innerHTML=out;
}

function onFoodSearch(q){
  const drop=document.getElementById('searchDrop');
  if(!q){drop.style.display='none';return;}
  const res=foodSearch(q);
  if(!res.length){drop.style.display='none';return;}
  drop.innerHTML=res.map((f,i)=>{
    const fi=FDB.indexOf(f);
    return`<div class="search-item" onclick="selectFood(${fi})">
      <div><div class="si-name">${f[0]}</div><div class="si-meta">${f[5]}</div></div>
      <div class="si-cal">${f[1]} kcal</div>
    </div>`;
  }).join('');
  drop.style.display='block';
}
function selectFood(fi){
  _pendingFood=fi;
  const f=FDB[fi];
  document.getElementById('searchDrop').style.display='none';
  document.getElementById('foodSearch').value='';
  document.getElementById('qtyName').textContent=f[0];
  document.getElementById('qtyUnit').textContent=`per ${f[5]}`;
  document.getElementById('qtyAmt').value=1;
  document.getElementById('qtyCal').textContent=`${f[1]} kcal`;
  document.getElementById('qtyRow').classList.add('on');
}
function updateQtyCal(){
  if(_pendingFood===null)return;
  const q=parseFloat(document.getElementById('qtyAmt').value)||1;
  document.getElementById('qtyCal').textContent=`${Math.round(FDB[_pendingFood][1]*q)} kcal`;
}
function confirmAddFood(){
  if(_pendingFood===null)return;
  const qty=parseFloat(document.getElementById('qtyAmt').value)||1;
  addFoodEntry(_pendingFood,qty);
  document.getElementById('qtyRow').classList.remove('on');
  _pendingFood=null;
}
function confirmCustomFood(){
  const n=document.getElementById('cName').value;
  const cal=document.getElementById('cCal').value;
  const p=document.getElementById('cProt').value||0;
  const c=document.getElementById('cCarb').value||0;
  const fat=document.getElementById('cFat').value||0;
  addCustomFood(n,cal,p,c,fat);
  ['cName','cCal','cProt','cCarb','cFat'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

/* ============================================================  PROGRESS TAB  */
function renderProgress(){
  const today=getDS(0);
  const last7=getLast7();
  const avgInt=Math.round(last7.reduce((a,d)=>a+getDayIntake(d.ds),0)/7);
  const avgBurn=Math.round(last7.reduce((a,d)=>a+getDayBurn(d.ds),0)/7);
  const avgNet=avgInt-avgBurn;
  const wtEntries=getLast14Wt();
  const latestWt=getLatestWt();
  const startWt=wtEntries.length?wtEntries[0][1]:null;
  const wtChange=startWt?Math.round((latestWt-startWt)*10)/10:null;

  let out=`<div class="sec-hd">Body Weight</div>
  <div class="wt-input-row">
    <input class="wt-inp" id="wtInput" type="number" step="0.1" placeholder="${latestWt} lbs" value="">
    <button class="save-wt-btn" onclick="saveWeight(document.getElementById('wtInput').value);document.getElementById('wtInput').value=''">Log</button>
  </div>

  <div class="stat-grid">
    <div class="stat-tile"><div class="stat-val" style="color:var(--accent)">${latestWt} lbs</div><div class="stat-lbl">Current Weight</div></div>
    <div class="stat-tile"><div class="stat-val" style="color:${wtChange<0?'var(--green)':'var(--amber)'}">${wtChange!==null?(wtChange>0?'+':'')+wtChange+' lbs':'—'}</div><div class="stat-lbl">Change</div></div>
    <div class="stat-tile"><div class="stat-val" style="color:var(--accent2)">${wtEntries.length}</div><div class="stat-lbl">Weigh-ins</div></div>
  </div>

  <div class="chart-card">
    <div class="chart-ttl">Weight Trend
      <div class="chart-legend"><span><span class="leg-dot" style="background:var(--accent)"></span>lbs</span></div>
    </div>
    ${wtChart()}
  </div>

  <div class="chart-card">
    <div class="chart-ttl">7-Day Calories
      <div class="chart-legend"><span><span class="leg-dot" style="background:rgba(232,83,143,0.65)"></span>Intake</span><span><span class="leg-dot" style="background:var(--amber)"></span>Burn</span></div>
    </div>
    ${calChart()}
    <div style="font-size:10px;color:var(--text2);margin-top:8px">Dashed pink line = 1,600 kcal target</div>
  </div>

  <div class="sec-hd">7-Day Averages</div>
  <div class="stat-grid">
    <div class="stat-tile"><div class="stat-val" style="color:var(--accent)">${avgInt||'—'}</div><div class="stat-lbl">Avg Intake</div></div>
    <div class="stat-tile"><div class="stat-val" style="color:var(--amber)">${avgBurn||'—'}</div><div class="stat-lbl">Avg Burn</div></div>
    <div class="stat-tile"><div class="stat-val" style="color:${avgNet<1400?'var(--green)':'var(--text2)'}">${avgNet||'—'}</div><div class="stat-lbl">Avg Net</div></div>
  </div>
  ${avgBurn>0&&avgInt>0?`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.7">
    <strong style="color:var(--text)">Estimated weekly deficit:</strong> ${Math.max(0,1600-avgNet)*7} kcal<br>
    <strong style="color:var(--text)">Est. weekly fat loss:</strong> ~${(Math.max(0,1600-avgNet)*7/3500).toFixed(2)} lbs<br>
    <span style="font-size:10px">Based on 3,500 kcal ≈ 1 lb fat. This is an estimate.</span>
  </div>`:''}

  <div class="sec-hd">Weight History</div>
  <div class="wt-hist">`;

  const allWts=Object.entries(BODY_WT).sort((a,b)=>b[0]<a[0]?-1:1).slice(0,14);
  if(!allWts.length)out+=`<div style="text-align:center;color:var(--text2);font-size:13px;padding:16px 0">No weight logged yet. Use the field above to log your weight.</div>`;
  else allWts.forEach(([ds,w])=>{
    const d=new Date(ds+'T00:00:00');
    out+=`<div class="wt-hist-item"><span class="wt-hist-date">${d.toLocaleDateString('en',{month:'short',day:'numeric',weekday:'short'})}</span><strong>${w} lbs</strong><button class="wt-del" onclick="deleteWeight('${ds}')">×</button></div>`;
  });

  out+=`</div>`;
  document.getElementById('tab-progress').innerHTML=out;
}

/* ============================================================  REFERENCE TAB  */
function renderRef(){
  let out=`<div class="scroll-tabs">
    <div class="stab on" onclick="showRef('overload',this)">Overload</div>
    <div class="stab" onclick="showRef('glutes',this)">Glutes</div>
    <div class="stab" onclick="showRef('cardio',this)">Cardio</div>
    <div class="stab" onclick="showRef('recovery',this)">Recovery</div>
    <div class="stab" onclick="showRef('glossary',this)">Glossary</div>
  </div>
  <div id="ref-overload" class="ref-sec on">
    <div class="sec-hd">Progressive Overload</div>
    ${coll('Rules & Triggers','📈',`
      <div class="rule-row"><span class="rico">✅</span><div><strong>Complete all sets</strong> → green 🔓 badge → weight auto-progresses next session.</div></div>
      <div class="rule-row"><span class="rico">⏸</span><div><strong>Miss any set</strong> → amber badge → same weight held until you complete it fully.</div></div>
      <div class="rule-row"><span class="rico">✏️</span><div><strong>Custom start/increment</strong> → tap ✏️ on any exercise to set your own starting weight and weekly increment.</div></div>
      <div class="rule-row"><span class="rico">📏</span><div><strong>Default increments:</strong> DBs +2.5 lb · Barbell +5 lb · Cables +5 lb</div></div>
      <div class="rule-row"><span class="rico">📊</span><div><strong>RPE:</strong> 7 = 3 reps left · 8 = 2 reps left · 9 = 1 rep left</div></div>`,true)}
    <div class="sec-hd">Phase Overview</div>
    ${coll('Weeks 1–2 — Foundation','🌱',`<p style="font-size:13px;color:var(--text2);line-height:1.6">3–4 sets × 10–12 reps at RPE 6–7. Conservative weights, focus on movement quality.</p>`,true)}
    ${coll('Weeks 3–4 — Build','🔨',`<p style="font-size:13px;color:var(--text2);line-height:1.6">4 sets × 8–10 reps at RPE 7.5–8. Significant load increase. Week 4 = peak volume.</p>`)}
    ${coll('Weeks 5–6 — Peak','🏆',`<p style="font-size:13px;color:var(--text2);line-height:1.6">4 sets × 5–8 reps at RPE 8.5–9. Heavy strength work. Week 6 = personal bests.</p>`)}
  </div>
  <div id="ref-glutes" class="ref-sec">
    <div class="sec-hd">Glute Anatomy</div>
    ${['Gluteus Maximus|Size, shape, power|Hip thrust, RDL, squat, high-foot leg press, cable pull-through',
       'Gluteus Medius|Upper outer shelf & roundness|Lateral band walk, clamshell, fire hydrant, sumo leg press',
       'Gluteus Minimus|Hip stability, abduction|Clamshell, lateral band walk, single-leg glute bridge']
    .map(row=>{const[m,r,e]=row.split('|');return`<div style="background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px"><div style="font-size:14px;font-weight:700;margin-bottom:3px">${m}</div><div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:5px">${r}</div><div style="font-size:12px;color:var(--text2)">${e}</div></div>`;}).join('')}
    ${coll('Hip Thrust Technique','🍑',`<p style="font-size:13px;color:var(--text2);line-height:1.6">Ribs down, chin tucked. Drive hips UP — not spine arching. At the top: straight line from knees to shoulders. Squeeze 2 seconds at full extension.</p>`,true)}
  </div>
  <div id="ref-cardio" class="ref-sec">
    <div class="sec-hd">Cardio Progression</div>
    ${CARDIO_PROTO.map(cp=>`<div class="cardio-blk"><div class="cardio-top"><span class="cardio-wk">${cp.wk}</span><span class="cardio-type">${cp.type}</span></div><p class="cardio-proto">${cp.text}</p></div>`).join('')}
  </div>
  <div id="ref-recovery" class="ref-sec">
    <div class="sec-hd">Recovery & Lifestyle</div>
    ${coll('Recovery Tips','🛌',RECOVERY.map(r=>`<div class="tip-row"><span class="tip-ico">${r.ico}</span><div><span class="tip-ttl">${r.ttl}</span><span style="color:var(--text2)">${r.txt}</span></div></div>`).join(''),true)}
  </div>
  <div id="ref-glossary" class="ref-sec">
    <div class="sec-hd">Exercise Glossary</div>
    ${coll('All Exercises','📚',GLOSSARY.map(g=>`<div class="gloss-item"><div class="gloss-name">${g.name}</div><div class="gloss-muscle">${g.muscle}</div><div class="gloss-cue">${g.cue}</div></div>`).join(''),true)}
  </div>`;
  document.getElementById('tab-ref').innerHTML=out;
}

/* ============================================================  INIT  */
function renderAll(){
  const ph=phase(CW);
  document.getElementById('wkLbl').textContent=`Week ${CW}`;
  document.getElementById('wkPhase').textContent=ph.label.split('—')[0].trim();
  renderToday();renderSchedule();renderLog();renderProgress();renderRef();
}
loadState();renderAll();
</script>
</body>
</html>
